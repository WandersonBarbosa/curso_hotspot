services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hotspot
      POSTGRES_PASSWORD: hotspot
      POSTGRES_DB: hotspot
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://hotspot:hotspot@postgres:5432/hotspot
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: troque-esta-chave-min-32-caracteres-aaaa
      JWT_REFRESH_SECRET: troque-esta-chave-refresh-min-32-bbbb
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
      CORS_ORIGIN: http://localhost,http://localhost:80
      NODE_ENV: production
      POSTGRES_HOST: postgres
      POSTGRES_USER: hotspot
      POSTGRES_PASSWORD: hotspot
      POSTGRES_DB: hotspot
    depends_on:
      - postgres
      - redis
    expose:
      - "4000"

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    expose:
      - "80"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      # - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro

volumes:
  pgdata:
