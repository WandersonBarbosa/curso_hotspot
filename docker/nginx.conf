events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;

  upstream hotspot_api {
    server backend:4000;
  }

  upstream hotspot_web {
    server frontend:80;
  }

  server {
    listen 80;
    server_name _;

    location /api/ {
      proxy_pass         http://hotspot_api;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /ws {
      proxy_pass         http://hotspot_api;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host $host;
    }

    location / {
      proxy_pass http://hotspot_web;
      proxy_set_header Host $host;
    }
  }

  # SSL: descomente e monte certificados em ./ssl (fullchain.pem / privkey.pem)
  # server {
  #   listen 443 ssl http2;
  #   server_name _;
  #   ssl_certificate     /etc/nginx/ssl/fullchain.pem;
  #   ssl_certificate_key /etc/nginx/ssl/privkey.pem;
  #   location /api/ { proxy_pass http://hotspot_api; ... }
  #   location /ws { ... }
  #   location / { proxy_pass http://hotspot_web; }
  # }
}
